<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream de Datos en Tiempo Real</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #0d1117; color: #58a6ff; padding: 30px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #58a6ff; border-bottom: 1px solid #21262d; padding-bottom: 10px; }
        .stream-box { background-color: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; margin-top: 20px; }
        .post { background: #0d1117; border-left: 3px solid #238636; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .date { color: #8b949e; font-size: 0.85rem; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Transmisión de Datos en Vivo (Streaming)</h1>
        <div class="stream-box" id="stream-content">Cargando flujo de datos...</div>
    </div>

    <script>
        fetch('http://localhost:3000/api/bluesky')
            .then(res => res.json())
            .then(data => {
                const box = document.getElementById('stream-content');
                box.innerHTML = '';
                
                data.items.forEach(item => {
                    box.innerHTML += `
                        <div class="post">
                            <p style="margin:0; color:#c9d1d9;">${item.text}</p>
                            <span class="date">📅 Emitido: ${new Date(item.date).toLocaleString()}</span>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('stream-content').innerHTML = '<p style="color:#f85149;">Error al conectar con el flujo de datos.</p>';
            });
    </script>
</body>
</html>
